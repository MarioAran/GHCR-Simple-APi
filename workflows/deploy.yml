name: Deploy to Kubernetes

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Permite ejecutar manualmente

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/simple-api
  NAMESPACE: simple-api
  DEPLOYMENT_NAME: simple-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Necesario para subir a GHCR

    steps:
      # 1. Clonar el código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Iniciar sesión en GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Construir la imagen Docker
      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

      # 4. Subir la imagen a GHCR
      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 5. Configurar kubectl para conectar con tu clúster
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      # 6. Configurar el kubeconfig
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config

      # 7. Aplicar los manifests (YAMLs) a Kubernetes
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f simple-api.yaml

      # 8. Forzar rollout (reiniciar pods con la nueva imagen)
      - name: Rollout restart
        run: |
          kubectl rollout restart deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}