apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MarioAran/GHCR-Simple-APi
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.simple-api.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true