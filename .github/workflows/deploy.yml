name: Deploy to Kubernetes

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted   

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Scan code with Trivy (fs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-code-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          trivyignores: |
            .git
            __pycache__
      - name: Build Docker image
        id: build
        run: |
          # Forzar minúsculas para el nombre del paquete
          OWNER_LOWER=$(echo '${{ github.actor }}' | tr '[:upper:]' '[:lower:]')
          FULL_IMAGE="ghcr.io/${OWNER_LOWER}/simple-api"
          
          echo "Construyendo imagen: ${FULL_IMAGE}:${{ github.sha }}"
          
          docker build -t ${FULL_IMAGE}:${{ github.sha }} .
          docker tag ${FULL_IMAGE}:${{ github.sha }} ${FULL_IMAGE}:latest
          
          # Guardar la variable para TODOS los siguientes steps
          echo "FULL_IMAGE=${FULL_IMAGE}" >> $GITHUB_ENV
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
      
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FULL_IMAGE }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      
      - name: Push Docker image 
        run: |   
          docker push ${{ env.FULL_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FULL_IMAGE }}:latest