name: Deploy to Kubernetes

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: simple-api
  IMAGE_FULL: ${{ github.repository_owner  }}/simple-api

jobs:
  build-and-deploy:
    runs-on: self-hosted   

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_FULL }}:${{ github.sha }} .
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_FULL }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_FULL }}:latest

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_FULL }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_FULL }}:latest