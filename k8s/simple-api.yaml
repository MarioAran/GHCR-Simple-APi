apiVersion: v1
kind: Namespace
metadata:
  name: simple-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-api
  namespace: simple-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-api
  template:
    metadata:
      labels:
        app: simple-api
    spec:
      containers:
      - name: api
        image: ghcr.io/marioaran/simple-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: simple-api-service
  namespace: simple-api
spec:
  type: NodePort
  selector:
    app: simple-api
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30080