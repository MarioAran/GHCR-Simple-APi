name: Deploy to Kubernetes

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: marioaran/simple-api

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          if [ -n "${{ secrets.KUBECONFIG_BASE64 }}" ]; then
            echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 --decode > $HOME/.kube/config
            echo "✅ Kubeconfig configurado desde secreto"
          elif [ -f "$HOME/.kube/config" ]; then
            echo "✅ Usando kubeconfig existente"
          else
            echo "⚠️ No hay kubeconfig. El clúster debe estar configurado manualmente."
          fi

      - name: Test kubectl connection
        run: |
          echo "=== Cluster Info ==="
          kubectl cluster-info
          echo "=== Nodes ==="
          kubectl get nodes

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/simple-api.yaml

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment simple-api -n simple-api || true
          kubectl rollout status deployment simple-api -n simple-api || true